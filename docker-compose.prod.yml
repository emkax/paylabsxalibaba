# Production Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # Backend API (FastAPI) - Production mode
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@mysql:3306/paylabs_merchant
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - PAYLABS_MERCHANT_ID=${PAYLABS_MERCHANT_ID:-010614}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - NODE_ENV=production
    # No volume mounts in production - image is immutable
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - paylabs-network
    restart: always

  # Frontend (Next.js) - Production mode
  frontend:
    build:
      context: ./merchant-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NODE_ENV=production
    # No volume mounts in production - image is immutable
    depends_on:
      - backend
    networks:
      - paylabs-network
    restart: always

# Override volumes to not persist dev data
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
